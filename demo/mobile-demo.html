<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrowdPulse - Mobile App Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { 
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); 
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .phone-frame {
      width: 375px;
      height: 812px;
      background: #0f0f0f;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      position: relative;
    }
    .notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 30px;
      background: #0f0f0f;
      border-radius: 0 0 20px 20px;
      z-index: 100;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.2); }
    }
    .pulse-dot { animation: pulse 2s ease-in-out infinite; }
    @keyframes slide-up {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .slide-up { animation: slide-up 0.3s ease-out; }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect } = React;

    // Mock venue data
    const mockVenues = [
      { id: 1, name: "The Rustic Tap", category: "bar", crowd: 72, trend: "filling_up", friendsHere: 3, distance: "0.2 mi", emoji: "🍺" },
      { id: 2, name: "Club Neon", category: "club", crowd: 89, trend: "stable", friendsHere: 0, distance: "0.4 mi", emoji: "🎵" },
      { id: 3, name: "Brew & Co", category: "cafe", crowd: 34, trend: "emptying", friendsHere: 1, distance: "0.3 mi", emoji: "☕" },
      { id: 4, name: "The Garden", category: "bar", crowd: 56, trend: "filling_up", friendsHere: 2, distance: "0.5 mi", emoji: "🌿" },
      { id: 5, name: "Whiskey Row", category: "bar", crowd: 45, trend: "stable", friendsHere: 0, distance: "0.6 mi", emoji: "🥃" },
    ];

    const mockFriends = [
      { id: 1, name: "Sarah", avatar: "S", status: "at_venue", venue: "The Rustic Tap", color: "#6366f1" },
      { id: 2, name: "Mike", avatar: "M", status: "going_out", venue: null, color: "#22c55e" },
      { id: 3, name: "Emma", avatar: "E", status: "at_venue", venue: "Brew & Co", color: "#f59e0b" },
    ];

    const mockPings = [
      { id: 1, sender: "Jake", venue: "The Rustic Tap", message: "Come through! Live music tonight 🎸", time: "10 min ago" },
      { id: 2, sender: "College Crew", venue: "Club Neon", message: "Birthday party at 11!", time: "1 hour ago" },
    ];

    // Helper functions
    const getCrowdColor = (percent) => {
      if (percent < 30) return '#22c55e';
      if (percent < 60) return '#eab308';
      if (percent < 80) return '#f97316';
      return '#ef4444';
    };

    const getCrowdLabel = (percent) => {
      if (percent < 30) return 'Quiet';
      if (percent < 60) return 'Moderate';
      if (percent < 80) return 'Busy';
      return 'Packed';
    };

    // Components
    function MapView({ venues, friends, vibeMode, onVenuePress }) {
      return (
        <div className="relative w-full h-full bg-gray-900 overflow-hidden">
          {/* Fake map background */}
          <div className="absolute inset-0 opacity-30">
            <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
              <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#333" strokeWidth="0.5"/>
              </pattern>
              <rect width="100%" height="100%" fill="url(#grid)" />
            </svg>
          </div>
          
          {/* Venues */}
          {venues.map((venue, i) => (
            <button
              key={venue.id}
              onClick={() => onVenuePress(venue)}
              className="absolute transform -translate-x-1/2 -translate-y-1/2 transition-transform hover:scale-110"
              style={{
                left: `${20 + (i * 15) % 60}%`,
                top: `${25 + (i * 20) % 50}%`,
              }}
            >
              <div className="relative">
                {/* Crowd indicator ring */}
                <div 
                  className="absolute -inset-1 rounded-full opacity-30"
                  style={{ backgroundColor: getCrowdColor(venue.crowd) }}
                />
                
                {/* Main marker */}
                <div className="relative bg-gray-800 rounded-xl px-3 py-2 border-2 shadow-lg" style={{ borderColor: getCrowdColor(venue.crowd) }}>
                  <div className="flex items-center gap-2">
                    <span className="text-lg">{venue.emoji}</span>
                    <span className="text-white font-bold text-sm">{venue.crowd}%</span>
                  </div>
                  
                  {/* Trend indicator */}
                  {venue.trend === 'filling_up' && (
                    <span className="absolute -top-1 -right-1 text-xs">📈</span>
                  )}
                  
                  {/* Friends badge */}
                  {venue.friendsHere > 0 && (
                    <div className="absolute -bottom-2 -right-2 bg-indigo-500 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center">
                      {venue.friendsHere}
                    </div>
                  )}
                </div>
                
                {/* Venue name */}
                <div className="text-center mt-1">
                  <span className="text-white text-xs font-medium bg-black/50 px-2 py-0.5 rounded">
                    {venue.name}
                  </span>
                </div>
              </div>
            </button>
          ))}
          
          {/* Friends on map */}
          {friends.filter(f => f.status !== 'offline').map((friend, i) => (
            <div
              key={friend.id}
              className="absolute transform -translate-x-1/2 -translate-y-1/2"
              style={{
                left: `${30 + (i * 25) % 40}%`,
                top: `${40 + (i * 15) % 30}%`,
              }}
            >
              <div className="relative">
                <div 
                  className="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold border-2 border-white shadow-lg"
                  style={{ backgroundColor: friend.color }}
                >
                  {friend.avatar}
                </div>
                <div className={`absolute -bottom-0.5 -right-0.5 w-3 h-3 rounded-full border-2 border-gray-900 ${friend.status === 'going_out' ? 'bg-green-400 pulse-dot' : 'bg-indigo-400'}`} />
              </div>
              <div className="text-center mt-1">
                <span className="text-white text-xs bg-black/50 px-1 rounded">{friend.name}</span>
              </div>
            </div>
          ))}
          
          {/* User location */}
          <div className="absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2">
            <div className="w-4 h-4 bg-blue-500 rounded-full border-2 border-white shadow-lg">
              <div className="absolute inset-0 bg-blue-500 rounded-full animate-ping opacity-50" />
            </div>
          </div>
        </div>
      );
    }

    function VenueSheet({ venue, onClose }) {
      if (!venue) return null;
      
      return (
        <div className="absolute inset-0 bg-black/60 z-50" onClick={onClose}>
          <div 
            className="absolute bottom-0 left-0 right-0 bg-gray-900 rounded-t-3xl p-6 slide-up"
            onClick={e => e.stopPropagation()}
          >
            {/* Handle */}
            <div className="w-12 h-1 bg-gray-700 rounded-full mx-auto mb-6" />
            
            {/* Venue header */}
            <div className="flex items-start justify-between mb-4">
              <div>
                <h2 className="text-2xl font-bold text-white">{venue.name}</h2>
                <p className="text-gray-400">{venue.category} • {venue.distance}</p>
              </div>
              <span className="text-3xl">{venue.emoji}</span>
            </div>
            
            {/* Crowd bar */}
            <div className="mb-6">
              <div className="flex justify-between items-center mb-2">
                <div className="flex items-center gap-2">
                  <div className="w-2 h-2 rounded-full pulse-dot" style={{ backgroundColor: getCrowdColor(venue.crowd) }} />
                  <span className="text-white font-medium">{getCrowdLabel(venue.crowd)}</span>
                </div>
                <span className="text-2xl font-bold" style={{ color: getCrowdColor(venue.crowd) }}>{venue.crowd}%</span>
              </div>
              <div className="h-2 bg-gray-800 rounded-full overflow-hidden">
                <div 
                  className="h-full rounded-full transition-all duration-500"
                  style={{ 
                    width: `${venue.crowd}%`, 
                    backgroundColor: getCrowdColor(venue.crowd) 
                  }}
                />
              </div>
            </div>
            
            {/* Friends here */}
            {venue.friendsHere > 0 && (
              <div className="bg-gray-800 rounded-xl p-4 mb-4">
                <p className="text-gray-400 text-sm mb-2">👥 {venue.friendsHere} friends here</p>
                <div className="flex -space-x-2">
                  {[...Array(venue.friendsHere)].map((_, i) => (
                    <div key={i} className="w-8 h-8 rounded-full bg-indigo-500 border-2 border-gray-800 flex items-center justify-center text-white text-xs font-bold">
                      {String.fromCharCode(65 + i)}
                    </div>
                  ))}
                </div>
              </div>
            )}
            
            {/* Actions */}
            <div className="flex gap-3">
              <button className="flex-1 bg-gray-800 text-indigo-400 py-4 rounded-xl font-semibold flex items-center justify-center gap-2">
                <span>📍</span> Ping Friends
              </button>
              <button className="flex-1 bg-indigo-600 text-white py-4 rounded-xl font-semibold flex items-center justify-center gap-2">
                <span>✓</span> Check In
              </button>
            </div>
          </div>
        </div>
      );
    }

    function GoingOutSheet({ visible, onClose }) {
      if (!visible) return null;
      
      return (
        <div className="absolute inset-0 bg-black/60 z-50" onClick={onClose}>
          <div 
            className="absolute bottom-0 left-0 right-0 bg-gray-900 rounded-t-3xl p-6 slide-up"
            onClick={e => e.stopPropagation()}
          >
            <div className="w-12 h-1 bg-gray-700 rounded-full mx-auto mb-6" />
            
            <h2 className="text-xl font-bold text-white text-center mb-6">Who can see you?</h2>
            
            <div className="space-y-3 mb-6">
              {[
                { id: 'all', label: 'All Friends', icon: '🌐', desc: 'Everyone you\'re connected with' },
                { id: 'groups', label: 'Select Groups', icon: '👥', desc: 'Choose specific friend groups' },
                { id: 'ghost', label: 'Ghost Mode', icon: '👻', desc: 'See venues without being seen' },
              ].map(option => (
                <button key={option.id} className="w-full bg-gray-800 rounded-xl p-4 flex items-center gap-4 hover:bg-gray-750 transition-colors">
                  <span className="text-2xl">{option.icon}</span>
                  <div className="text-left">
                    <p className="text-white font-medium">{option.label}</p>
                    <p className="text-gray-500 text-sm">{option.desc}</p>
                  </div>
                </button>
              ))}
            </div>
            
            <button className="w-full bg-green-500 text-white py-4 rounded-xl font-bold text-lg">
              🚀 Start Sharing
            </button>
          </div>
        </div>
      );
    }

    function RadarScreen({ onVenuePress }) {
      const [vibeMode, setVibeMode] = useState('all');
      const [showGoingOut, setShowGoingOut] = useState(false);
      const [selectedVenue, setSelectedVenue] = useState(null);
      
      const filteredVenues = vibeMode === 'all' 
        ? mockVenues 
        : vibeMode === 'lively' 
          ? mockVenues.filter(v => v.crowd >= 60)
          : mockVenues.filter(v => v.crowd < 50);
      
      const friendsOut = mockFriends.filter(f => f.status !== 'offline').length;

      return (
        <div className="h-full flex flex-col bg-gray-950">
          {/* Header */}
          <div className="pt-12 px-4 pb-4">
            <div className="flex items-center justify-between mb-4">
              <h1 className="text-2xl font-bold text-white">Radar</h1>
              <div className="flex items-center gap-2 bg-gray-800 px-3 py-1.5 rounded-full">
                <div className="w-2 h-2 bg-green-400 rounded-full pulse-dot" />
                <span className="text-green-400 text-sm font-medium">{friendsOut} friends out</span>
              </div>
            </div>
            
            {/* Vibe toggle */}
            <div className="flex bg-gray-800 rounded-xl p-1">
              {[
                { id: 'all', label: 'All' },
                { id: 'lively', label: '🔥 Lively' },
                { id: 'lowkey', label: '😌 Lowkey' },
              ].map(mode => (
                <button
                  key={mode.id}
                  onClick={() => setVibeMode(mode.id)}
                  className={`flex-1 py-2 rounded-lg text-sm font-medium transition-colors ${
                    vibeMode === mode.id 
                      ? 'bg-indigo-600 text-white' 
                      : 'text-gray-400'
                  }`}
                >
                  {mode.label}
                </button>
              ))}
            </div>
          </div>
          
          {/* Map */}
          <div className="flex-1 relative">
            <MapView 
              venues={filteredVenues} 
              friends={mockFriends}
              vibeMode={vibeMode}
              onVenuePress={setSelectedVenue}
            />
            
            {/* Going out button */}
            <button 
              onClick={() => setShowGoingOut(true)}
              className="absolute bottom-6 left-1/2 transform -translate-x-1/2 bg-gradient-to-r from-indigo-600 to-purple-600 text-white px-8 py-4 rounded-full font-bold shadow-lg flex items-center gap-2"
            >
              <span className="text-lg">🚀</span>
              Going Out
            </button>
          </div>
          
          {/* Sheets */}
          <VenueSheet venue={selectedVenue} onClose={() => setSelectedVenue(null)} />
          <GoingOutSheet visible={showGoingOut} onClose={() => setShowGoingOut(false)} />
        </div>
      );
    }

    function FriendsScreen() {
      return (
        <div className="h-full bg-gray-950 pt-12 px-4">
          <h1 className="text-2xl font-bold text-white mb-6">Friends</h1>
          
          <div className="space-y-3">
            {mockFriends.map(friend => (
              <div key={friend.id} className="bg-gray-900 rounded-xl p-4 flex items-center gap-4">
                <div className="relative">
                  <div 
                    className="w-12 h-12 rounded-full flex items-center justify-center text-white font-bold"
                    style={{ backgroundColor: friend.color }}
                  >
                    {friend.avatar}
                  </div>
                  <div className={`absolute -bottom-0.5 -right-0.5 w-3 h-3 rounded-full border-2 border-gray-900 ${
                    friend.status === 'going_out' ? 'bg-green-400' : 
                    friend.status === 'at_venue' ? 'bg-indigo-400' : 'bg-gray-600'
                  }`} />
                </div>
                <div className="flex-1">
                  <p className="text-white font-medium">{friend.name}</p>
                  <p className="text-gray-500 text-sm">
                    {friend.status === 'at_venue' ? `📍 ${friend.venue}` : 
                     friend.status === 'going_out' ? '🚀 Going out' : 'Offline'}
                  </p>
                </div>
                <button className="text-indigo-400 text-sm font-medium">Ping</button>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function ActivityScreen() {
      return (
        <div className="h-full bg-gray-950 pt-12 px-4">
          <h1 className="text-2xl font-bold text-white mb-6">Activity</h1>
          
          <div className="space-y-3">
            {mockPings.map(ping => (
              <div key={ping.id} className="bg-gray-900 rounded-xl p-4">
                <div className="flex items-start justify-between mb-3">
                  <div>
                    <p className="text-white font-medium">{ping.sender}</p>
                    <p className="text-indigo-400 text-sm">📍 {ping.venue}</p>
                  </div>
                  <span className="text-gray-500 text-xs">{ping.time}</span>
                </div>
                <p className="text-gray-300 text-sm mb-4">{ping.message}</p>
                <div className="flex gap-2">
                  <button className="flex-1 bg-green-500/20 text-green-400 py-2 rounded-lg text-sm font-medium">
                    ✓ I'm in
                  </button>
                  <button className="flex-1 bg-yellow-500/20 text-yellow-400 py-2 rounded-lg text-sm font-medium">
                    🤔 Maybe
                  </button>
                  <button className="flex-1 bg-gray-800 text-gray-400 py-2 rounded-lg text-sm font-medium">
                    ✗ Out
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function App() {
      const [activeTab, setActiveTab] = useState('radar');

      const tabs = [
        { id: 'radar', label: 'Radar', icon: '📍' },
        { id: 'friends', label: 'Friends', icon: '👥' },
        { id: 'activity', label: 'Activity', icon: '🔔' },
        { id: 'profile', label: 'Profile', icon: '👤' },
      ];

      return (
        <div className="flex flex-col items-center gap-8">
          <div>
            <h1 className="text-3xl font-bold text-white text-center mb-2">CrowdPulse Mobile</h1>
            <p className="text-gray-400 text-center">Interactive Preview</p>
          </div>
          
          <div className="phone-frame">
            <div className="notch" />
            
            <div className="h-full flex flex-col">
              {/* Screen content */}
              <div className="flex-1 overflow-hidden">
                {activeTab === 'radar' && <RadarScreen />}
                {activeTab === 'friends' && <FriendsScreen />}
                {activeTab === 'activity' && <ActivityScreen />}
                {activeTab === 'profile' && (
                  <div className="h-full bg-gray-950 pt-12 px-4 flex items-center justify-center">
                    <p className="text-gray-500">Profile Screen</p>
                  </div>
                )}
              </div>
              
              {/* Tab bar */}
              <div className="bg-gray-900 border-t border-gray-800 px-4 py-2 pb-8">
                <div className="flex justify-around">
                  {tabs.map(tab => (
                    <button
                      key={tab.id}
                      onClick={() => setActiveTab(tab.id)}
                      className={`flex flex-col items-center py-2 px-4 ${
                        activeTab === tab.id ? 'text-indigo-400' : 'text-gray-500'
                      }`}
                    >
                      <span className="text-xl mb-1">{tab.icon}</span>
                      <span className="text-xs">{tab.label}</span>
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </div>
          
          <p className="text-gray-500 text-sm">Click on venues and buttons to interact</p>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
